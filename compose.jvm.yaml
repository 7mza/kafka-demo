services:
  gen-certs:
    extends:
      file: compose.yaml
      service: gen-certs

  kafka1:
    extends:
      file: compose.yaml
      service: kafka1
    depends_on: &kafkaDeps
      gen-certs:
        condition: service_completed_successfully

  acls-init:
    extends:
      file: compose.yaml
      service: acls-init

  kafka2:
    extends:
      file: compose.yaml
      service: kafka2
    depends_on: *kafkaDeps

  kafka3:
    extends:
      file: compose.yaml
      service: kafka3
    depends_on: *kafkaDeps

  kafka-ui:
    extends:
      file: compose.yaml
      service: kafka-ui

  schema-registry:
    extends:
      file: compose.yaml
      service: schema-registry

  connect:
    extends:
      file: compose.yaml
      service: connect

  connect-init:
    extends:
      file: compose.yaml
      service: connect-init

  postgres:
    extends:
      file: compose.yaml
      service: postgres

  order-api:
    image: order-api:latest
    container_name: order-api
    depends_on: &springDeps
      acls-init:
        condition: service_completed_successfully
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseG1GC -XX:+UseStringDeduplication
      SPRING_PROFILES_ACTIVE: default, container
      INVENTORY_ACCEPTED_ORDERS_TOPIC_NAME: ${INVENTORY_ACCEPTED_ORDERS_TOPIC_NAME}
      INVENTORY_REJECTED_ORDERS_TOPIC_NAME: ${INVENTORY_REJECTED_ORDERS_TOPIC_NAME}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_LOGGING_LEVEL: ${KAFKA_LOGGING_LEVEL}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_INSYNC_REPLICAS}
      KAFKA_PARTITIONS: ${KAFKA_PARTITIONS}
      KAFKA_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      ORDER_BATCH_SIZE: ${ORDER_BATCH_SIZE}
      ORDER_MAX_ATTEMPTS: ${ORDER_MAX_ATTEMPTS}
      ORDER_PLACED_TOPIC_NAME: ${ORDER_PLACED_TOPIC_NAME}
      ORDER_POLL_DELAY: ${ORDER_POLL_DELAY}
      ORDER_POLL_INITIAL_DELAY: ${ORDER_POLL_INITIAL_DELAY}
      ORDER_PUBLISH_TIMEOUT: ${ORDER_PUBLISH_TIMEOUT}
      PKCS12_PASSWORD: ${PKCS12_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      SSL_KEYSTORE_LOCATION: ${SECRETS_DIR}/order-api.p12
      SSL_TRUSTSTORE_LOCATION: ${SECRETS_DIR}/truststore.p12
    ports:
      - '8080:80'
    restart: unless-stopped
    volumes:
      - ${PWD}/certs/order-api.p12:${SECRETS_DIR}/order-api.p12:ro
      - ${PWD}/certs/truststore.p12:${SECRETS_DIR}/truststore.p12:ro

  inventory-service:
    image: inventory-service:latest
    container_name: inventory-service
    depends_on: *springDeps
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseG1GC -XX:+UseStringDeduplication
      SPRING_PROFILES_ACTIVE: default, container
      INVENTORY_ACCEPTED_ORDERS_TOPIC_NAME: ${INVENTORY_ACCEPTED_ORDERS_TOPIC_NAME}
      INVENTORY_BATCH_SIZE: ${INVENTORY_BATCH_SIZE}
      INVENTORY_POLL_DELAY: ${INVENTORY_POLL_DELAY}
      INVENTORY_POLL_INITIAL_DELAY: ${INVENTORY_POLL_INITIAL_DELAY}
      INVENTORY_REJECTED_ORDERS_TOPIC_NAME: ${INVENTORY_REJECTED_ORDERS_TOPIC_NAME}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_LOGGING_LEVEL: ${KAFKA_LOGGING_LEVEL}
      KAFKA_PARTITIONS: ${KAFKA_PARTITIONS}
      ORDER_PLACED_TOPIC_NAME: ${ORDER_PLACED_TOPIC_NAME}
      PKCS12_PASSWORD: ${PKCS12_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      SSL_KEYSTORE_LOCATION: ${SECRETS_DIR}/inventory-service.p12
      SSL_TRUSTSTORE_LOCATION: ${SECRETS_DIR}/truststore.p12
    ports:
      - '8081:80'
    restart: unless-stopped
    volumes:
      - ${PWD}/certs/inventory-service.p12:${SECRETS_DIR}/inventory-service.p12:ro
      - ${PWD}/certs/truststore.p12:${SECRETS_DIR}/truststore.p12:ro

  inventory-service-hc:
    extends:
      file: compose.yaml
      service: inventory-service-hc

  tracer:
    extends:
      file: compose.yaml
      service: tracer

  prometheus:
    extends:
      file: compose.yaml
      service: prometheus

  grafana:
    extends:
      file: compose.yaml
      service: grafana
