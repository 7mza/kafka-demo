>outbox_channel</text><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg10"><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="166.899" x2="208.899" y1="463.8341" y2="463.8341"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="208.899" x2="208.899" y1="463.8341" y2="476.8341"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="167.899" x2="208.899" y1="476.8341" y2="476.8341"/><polygon fill="#181818" points="177.899,472.8341,167.899,476.8341,177.899,480.8341,173.899,476.8341" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.3701" x="173.899" y="458.0251">trigger drain service</text></g><path d="M19,491.8341 L92.288,491.8341 L92.288,501.5401 L82.288,511.5401 L19,511.5401 L19,491.8341" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="903.1262" style="stroke:#000000;stroke-width:1.5;" width="725.5544" x="19" y="491.8341"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="28.288" x="34" y="506.7311">loop</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="228.6334" x="107.288" y="505.593">[until no unpublished outbox is retrieved]</text><path d="M49,516.5401 L49,579.5401 L476,579.5401 L476,526.5401 L466,516.5401 L49,516.5401" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M466,516.5401 L466,526.5401 L476,526.5401 L466,516.5401" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="83.6421" x="58.3878" y="535.4371">drain service</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.484" x="142.0299" y="535.4371">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="399.4513" x="58.3878" y="553.1431">keep draining unpublished outboxes until none is left then sleeps</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.4432" x="58.3878" y="570.8492">is gated by a linear back off in case kafka is unhealthy</text><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg11"><polygon fill="#181818" points="363.0312,625.0702,373.0312,629.0702,363.0312,633.0702,367.0312,629.0702" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="166.899" x2="369.0312" y1="629.0702" y2="629.0702"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.1322" x="178.899" y="623.2612">get unpublished outbox batch</text></g><path d="M380,589.6582 L380,652.6582 L729,652.6582 L729,599.6582 L719,589.6582 L380,589.6582" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M719,589.6582 L719,599.6582 L729,599.6582 L719,589.6582" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="328.5232" x="386" y="608.5552">publishedAt == null AND attempts &lt; max_attempts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.9593" x="386" y="626.2612">will lock current batch in DB in case of concurrency</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.0692" x="386" y="643.9672">any concurrent will pick next batch</text><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg13"><polygon fill="#181818" points="177.899,677.4822,167.899,681.4822,177.899,685.4822,173.899,681.4822" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="171.899" x2