custom:
  batch_size: 10
  max_attempts: 10
  min_insync_replicas: 1
  partitions: 1
  poll_delay: PT1M
  poll_initial_delay: PT1M
  publish_timeout: PT5S
  replication_factor: 1
  topic_name: orders.placed
logbook:
  format:
    style: http
  predicate:
    exclude:
      - path: /actuator/**
      - path: /api-docs/**
      - path: /swagger-ui/**
logging:
  include-application-name: false
  level:
    com.hamza: info
    org.apache.kafka: warn
    org.hibernate:
      SQL: debug
      stat: debug
    org.zalando.logbook: trace
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
server:
  compression:
    additional-mime-types: application/x-ndjson,text/event-stream
    enabled: true
  forward-headers-strategy: native
  port: 8080
  ssl:
    enabled: false
spring:
  application:
    name: order-api
  config:
    activate:
      on-profile: default
    import:
      - optional:file:.env[.properties]
  datasource:
    driverClassName: org.postgresql.Driver
    hikari:
      connection-init-sql: set search_path to "${spring.application.name}"
    password: ${POSTGRES_PASSWORD}
    url: jdbc:postgresql://${custom.pg.host:localhost}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
  devtools:
    restart:
      enabled: false
  docker:
    compose:
      enabled: true
      file: compose.dev.yaml
      profiles:
        active:
          - kafka
          - kafka-ui
          - postgres
      start:
        arguments:
          - --remove-orphans
  jackson:
    default-property-inclusion: non_null
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        batch_fetch_style: dynamic
        cache:
          region:
            factory_class: org.hibernate.cache.jcache.internal.JCacheRegionFactory
          use_query_cache: true
          use_second_level_cache: true
        default_batch_fetch_size: 32
        default_schema: ${spring.application.name}
        enable_lazy_load_no_trans: false
        format_sql: false
        generate_statistics: true
        globally_quoted_identifiers: true
        javax:
          cache:
            missing_cache_strategy: fail
            provider: org.ehcache.jsr107.EhcacheCachingProvider
            uri: ehcache.xml
        jdbc:
          batch_size: 32
        jpa:
          compliance:
            query: false
        max_fetch_depth: 1
        order_inserts: true
        order_updates: true
        query:
          fail_on_pagination_over_collection_fetch: true
          in_clause_parameter_padding: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: '100'
        show_sql: false
        type:
          json_format_mapper: jackson3
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable:
          idempotence: false
          spring:
            json:
              trusted:
                packages: 'com.hamza.*'
      retries: 0
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  liquibase:
    analytics-enabled: false
    default-schema: ${spring.application.name}
    drop-first: true
    enabled: true
  main:
    banner-mode: off
  output:
    ansi:
      enabled: always
  sql:
    init:
      mode: never
  threads:
    virtual:
      enabled: true
  web:
    error:
      include-exception: true
      include-message: always
      include-stacktrace: never
springdoc:
  api-docs:
    path: /api-docs
  packagesToScan: com.hamza
  pathsToMatch: /**
  swagger-ui:
    disable-swagger-default-url: true
    doc-expansion: none
    operationsSorter: method
    path: /swagger-ui
    tagsSorter: alpha
---
custom:
  batch_size: ${ORDERS_BATCH_SIZE}
  max_attempts: ${ORDERS_MAX_ATTEMPTS}
  min_insync_replicas: ${ORDERS_MIN_INSYNC_REPLICAS}
  partitions: ${ORDERS_PARTITIONS}
  pg:
    host: postgres
  poll_delay: ${ORDERS_POLL_DELAY}
  poll_initial_delay: ${ORDERS_POLL_INITIAL_DELAY}
  publish_timeout: ${ORDERS_PUBLISH_TIMEOUT}
  replication_factor: ${ORDERS_REPLICATION_FACTOR}
  topic_name: ${ORDERS_TOPIC_NAME}
server:
  port: 80
spring:
  config:
    activate:
      on-profile: container
  devtools:
    add-properties: false
  docker:
    compose:
      enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  liquibase:
    drop-first: false
