# test YAML should mirror main YAML as much as possible for GraalVM tracing agent to intercept everything
# general exceptions to this rule are testcontainers service connections
custom:
  batch_size: 10
  max_attempts: 10
  min_insync_replicas: 1
  partitions: 1
  poll_delay: PT24H
  poll_initial_delay: PT24H
  publish_timeout: PT5S
  replication_factor: 1
  topics:
    accepted: orders.accepted
    placed: orders.placed
    rejected: orders.rejected
logbook:
  format:
    style: http
  predicate:
    include:
      - path: /api/**
logging:
  level:
    com.hamza: debug
    org.apache.kafka: error
    org.hibernate.SQL_SLOW: info
    root: warn
server:
  port: 0
  ssl:
    enabled: false
spring:
  application:
    name: order-api
  config:
    activate:
      on-profile: default
  datasource:
    driverClassName: org.postgresql.Driver
    hikari:
      connection-init-sql: set search_path to "${spring.application.name}"
  jackson:
    default-property-inclusion: non_null
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        batch_fetch_style: dynamic
        cache:
          region:
            factory_class: org.hibernate.cache.jcache.internal.JCacheRegionFactory
          use_query_cache: true
          use_second_level_cache: true
        default_batch_fetch_size: 32
        default_schema: ${spring.application.name}
        enable_lazy_load_no_trans: false
        format_sql: false
        generate_statistics: true
        globally_quoted_identifiers: true
        javax:
          cache:
            missing_cache_strategy: fail
            provider: org.ehcache.jsr107.EhcacheCachingProvider
            uri: ehcache.xml
        jdbc:
          batch_size: 32
        jpa:
          compliance:
            query: false
        max_fetch_depth: 1
        order_inserts: true
        order_updates: true
        query:
          fail_on_pagination_over_collection_fetch: true
          in_clause_parameter_padding: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: '100'
        show_sql: false
        type:
          json_format_mapper: jackson3
  kafka:
    admin:
      modify-topic-configs: true
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        schema:
          registry:
            url: http://localhost:9091
        specific:
          avro:
            reader: true
        spring:
          deserializer:
            value:
              delegate:
                class: io.confluent.kafka.serializers.KafkaAvroDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
    listener:
      ack-mode: manual
      concurrency: 1
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable:
          idempotence: false
        max:
          block:
            ms: 5000
        metadata:
          max:
            age:
              ms: 1000
        request:
          timeout:
            ms: 2000
        schema:
          registry:
            url: http://localhost:9091
      retries: 0
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
  liquibase:
    analytics-enabled: false
    default-schema: ${spring.application.name}
    enabled: true
  main:
    banner-mode: off
  output:
    ansi:
      enabled: always
  sql:
    init:
      mode: never
  threads:
    virtual:
      enabled: true
springdoc:
  api-docs:
    path: /api-docs
  packagesToScan: com.hamza
  pathsToMatch: /**
  swagger-ui:
    disable-swagger-default-url: true
    doc-expansion: none
    operationsSorter: method
    path: /swagger-ui
    tagsSorter: alpha
