services:
  kafka1:
    image: apache/kafka:latest
    container_name: kafka1
    deploy: &deploy
      resources:
        limits:
          memory: 1g
    environment: &kafkaEnv
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka1:19092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_PROCESS_ROLES: broker,controller
    healthcheck: &healthcheck
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1',
        ]
      interval: 30s
      retries: 3
      start_period: 30s
      timeout: 10s
    ports:
      - '9092:9092'
    restart: unless-stopped

  kafka2:
    image: apache/kafka:latest
    container_name: kafka2
    deploy: *deploy
    environment:
      <<: *kafkaEnv
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9093,PLAINTEXT://kafka2:19092
      KAFKA_NODE_ID: 2
    healthcheck: *healthcheck
    ports:
      - '9093:9092'
    restart: unless-stopped

  kafka3:
    image: apache/kafka:latest
    container_name: kafka3
    deploy: *deploy
    environment:
      <<: *kafkaEnv
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9094,PLAINTEXT://kafka3:19092
      KAFKA_NODE_ID: 3
    healthcheck: *healthcheck
    ports:
      - '9094:9092'
    restart: unless-stopped

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on: &depends
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    deploy: *deploy
    environment:
      JAVA_OPTS: --add-modules jdk.incubator.vector
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:19092,kafka2:19092,kafka3:19092
      KAFKA_CLUSTERS_0_NAME: local
      LOGGING_LEVEL_IO_KAFBAT_UI: ERROR
      LOGGING_LEVEL_ROOT: ERROR
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'wget -qO- localhost:8080/actuator/health | grep -q "{\"status\":\"UP\"}" || exit 1',
        ]
    ports:
      - '9090:8080'
    restart: unless-stopped

  postgres:
    image: postgres:alpine
    container_name: postgres
    deploy: *deploy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER} | grep -q "accepting connections" || exit 1',
        ]
    ports:
      - '5432:5432'
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: schema-registry
    depends_on:
      <<: *depends
    deploy: *deploy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka1:19092,kafka2:19092,kafka3:19092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:9091
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      <<: *healthcheck
      test: ['CMD-SHELL', 'echo > /dev/tcp/localhost/9091']
    ports:
      - '9091:9091'
    restart: unless-stopped

  order-api:
    image: 7mza/order-api:latest
    container_name: order-api
    depends_on:
      <<: *depends
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    deploy: *deploy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_LOGGING_LEVEL: ${KAFKA_LOGGING_LEVEL}
      ORDERS_BATCH_SIZE: ${ORDERS_BATCH_SIZE}
      ORDERS_MAX_ATTEMPTS: ${ORDERS_MAX_ATTEMPTS}
      ORDERS_MIN_INSYNC_REPLICAS: ${ORDERS_MIN_INSYNC_REPLICAS}
      ORDERS_PARTITIONS: ${ORDERS_PARTITIONS}
      ORDERS_POLL_DELAY: ${ORDERS_POLL_DELAY}
      ORDERS_POLL_INITIAL_DELAY: ${ORDERS_POLL_INITIAL_DELAY}
      ORDERS_PUBLISH_TIMEOUT: ${ORDERS_PUBLISH_TIMEOUT}
      ORDERS_REPLICATION_FACTOR: ${ORDERS_REPLICATION_FACTOR}
      ORDERS_TOPIC_NAME: ${ORDERS_TOPIC_NAME}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - '8080:80'
    restart: unless-stopped

  inventory-service:
    image: 7mza/inventory-service:latest
    container_name: inventory-service
    depends_on:
      <<: *depends
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    deploy: *deploy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_LOGGING_LEVEL: ${KAFKA_LOGGING_LEVEL}
      INVENTORY_BATCH_SIZE: ${INVENTORY_BATCH_SIZE}
      ORDERS_PARTITIONS: ${ORDERS_PARTITIONS}
      INVENTORY_POLL_DELAY: ${INVENTORY_POLL_DELAY}
      INVENTORY_POLL_INITIAL_DELAY: ${INVENTORY_POLL_INITIAL_DELAY}
      ORDERS_TOPIC_NAME: ${ORDERS_TOPIC_NAME}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - '8081:80'
    restart: unless-stopped
