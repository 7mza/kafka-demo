services:
  kafka1:
    image: apache/kafka:latest
    container_name: kafka1
    environment: &kafkaEnv
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka1:19092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_PROCESS_ROLES: broker,controller
    healthcheck: &healthcheck
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1',
        ]
      interval: 30s
      retries: 3
      start_period: 30s
      timeout: 10s
    ports:
      - '9092:9092'
    restart: unless-stopped

  kafka2:
    image: apache/kafka:latest
    container_name: kafka2
    environment:
      <<: *kafkaEnv
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9093,PLAINTEXT://kafka2:19092
      KAFKA_NODE_ID: 2
    healthcheck: *healthcheck
    ports:
      - '9093:9092'
    restart: unless-stopped

  kafka3:
    image: apache/kafka:latest
    container_name: kafka3
    environment:
      <<: *kafkaEnv
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9094,PLAINTEXT://kafka3:19092
      KAFKA_NODE_ID: 3
    healthcheck: *healthcheck
    ports:
      - '9094:9092'
    restart: unless-stopped

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      connect:
        condition: service_healthy
    environment:
      JAVA_OPTS: --add-modules jdk.incubator.vector
      JAVA_TOOL_OPTIONS: -XX:+UseG1GC -XX:+UseStringDeduplication
      SPRING_MAIN_BANNER-MODE: off
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:19092,kafka2:19092,kafka3:19092
      KAFKA_CLUSTERS_0_DEFAULTVALUESERDE: SchemaRegistry
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:9091
      LOGGING_LEVEL_IO_KAFBAT_UI: ERROR
      LOGGING_LEVEL_ROOT: ERROR
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'wget -qO- localhost:8080/actuator/health | grep -q "{\"status\":\"UP\"}" || exit 1',
        ]
    ports:
      - '9080:8080'
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: schema-registry
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka1:19092,kafka2:19092,kafka3:19092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:9091
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      <<: *healthcheck
      test: ['CMD-SHELL', 'echo > /dev/tcp/localhost/9091']
    ports:
      - '9091:9091'
    restart: unless-stopped

  connect:
    image: quay.io/debezium/connect:latest
    container_name: connect
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseG1GC -XX:+UseStringDeduplication
      BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONFIG_STORAGE_TOPIC: debezium.configs
      GROUP_ID: debezium
      LOG_LEVEL: WARN
      OFFSET_STORAGE_REPLICATION_FACTOR: 3
      OFFSET_STORAGE_TOPIC: debezium.offsets
      STATUS_STORAGE_REPLICATION_FACTOR: 3
      STATUS_STORAGE_TOPIC: debezium.statuses
    healthcheck:
      <<: *healthcheck
      test: ['CMD-SHELL', 'curl -sf localhost:8083/connectors || exit 1']
    ports:
      - '8083:8083'
    restart: unless-stopped

  connect-init:
    build:
      dockerfile: ${PWD}/docker/alpine/Dockerfile
    container_name: connect-init
    command: >
      -c "envsubst '$$POSTGRES_DB $$POSTGRES_USER $$POSTGRES_PASSWORD $$ORDERS_PARTITIONS $$ORDERS_REPLICATION_FACTOR'
      < /tmp/connector.template.json > /tmp/connector.json &&
      curl -sS -f -X PUT -H 'Content-Type: application/json' --data @/tmp/connector.json http://connect:8083/connectors/inventory-outbox-connector/config"
    depends_on:
      connect:
        condition: service_healthy
      inventory-service-hc:
        condition: service_healthy
    entrypoint: ['/bin/sh']
    environment:
      ORDERS_PARTITIONS: ${ORDERS_PARTITIONS}
      ORDERS_REPLICATION_FACTOR: ${ORDERS_REPLICATION_FACTOR}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    restart: on-failure
    volumes:
      - ${PWD}/docker/debezium/connector.template.json:/tmp/connector.template.json:ro

  postgres:
    image: postgres:alpine
    container_name: postgres
    command: ['postgres', '-c', 'wal_level=logical']
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER} | grep -q "accepting connections" || exit 1',
        ]
      interval: 30s
      retries: 3
      start_period: 30s
      timeout: 10s
    ports:
      - '5432:5432'
    restart: unless-stopped

  order-api:
    image: 7mza/order-api:latest
    container_name: order-api
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      INVENTORY_ACCEPTED_ORDERS_TOPIC_NAME: ${INVENTORY_ACCEPTED_ORDERS_TOPIC_NAME}
      INVENTORY_REJECTED_ORDERS_TOPIC_NAME: ${INVENTORY_REJECTED_ORDERS_TOPIC_NAME}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_LOGGING_LEVEL: ${KAFKA_LOGGING_LEVEL}
      ORDERS_BATCH_SIZE: ${ORDERS_BATCH_SIZE}
      ORDERS_MAX_ATTEMPTS: ${ORDERS_MAX_ATTEMPTS}
      ORDERS_MIN_INSYNC_REPLICAS: ${ORDERS_MIN_INSYNC_REPLICAS}
      ORDERS_PARTITIONS: ${ORDERS_PARTITIONS}
      ORDERS_PLACED_TOPIC_NAME: ${ORDERS_PLACED_TOPIC_NAME}
      ORDERS_POLL_DELAY: ${ORDERS_POLL_DELAY}
      ORDERS_POLL_INITIAL_DELAY: ${ORDERS_POLL_INITIAL_DELAY}
      ORDERS_PUBLISH_TIMEOUT: ${ORDERS_PUBLISH_TIMEOUT}
      ORDERS_REPLICATION_FACTOR: ${ORDERS_REPLICATION_FACTOR}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - '8080:80'
    restart: unless-stopped

  inventory-service:
    image: 7mza/inventory-service:latest
    container_name: inventory-service
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      INVENTORY_ACCEPTED_ORDERS_TOPIC_NAME: ${INVENTORY_ACCEPTED_ORDERS_TOPIC_NAME}
      INVENTORY_BATCH_SIZE: ${INVENTORY_BATCH_SIZE}
      INVENTORY_POLL_DELAY: ${INVENTORY_POLL_DELAY}
      INVENTORY_POLL_INITIAL_DELAY: ${INVENTORY_POLL_INITIAL_DELAY}
      INVENTORY_REJECTED_ORDERS_TOPIC_NAME: ${INVENTORY_REJECTED_ORDERS_TOPIC_NAME}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_LOGGING_LEVEL: ${KAFKA_LOGGING_LEVEL}
      ORDERS_PARTITIONS: ${ORDERS_PARTITIONS}
      ORDERS_PLACED_TOPIC_NAME: ${ORDERS_PLACED_TOPIC_NAME}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - '8081:80'
    restart: unless-stopped

  # inventory-service healthcheck sidecar, service is a static musl bin without external tools
  inventory-service-hc:
    image: curlimages/curl:latest
    container_name: inventory-service-hc
    depends_on:
      inventory-service:
        condition: service_started
    entrypoint: ['sleep', 'infinity']
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'curl -fs http://inventory-service:80/actuator/health/liveness | grep -q "UP" || exit 1',
        ]
    restart: unless-stopped

  tracer:
    build:
      dockerfile: ${PWD}/docker/jaeger/Dockerfile
    container_name: tracer
    command: ['--config', '/etc/jaeger/config.yaml']
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - OTEL_TRACES_SAMPLER=always_off
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'wget -qO- 0.0.0.0:13133/status | jq .healthy | grep -q "true" || exit 1',
        ]
    ports:
      - '16686:16686'
      - '4317:4317'
    restart: unless-stopped
    volumes:
      - ${PWD}/docker/jaeger/config.yaml:/etc/jaeger/config.yaml:ro
      - ${PWD}/docker/jaeger/jaeger-ui.json:/etc/jaeger/jaeger-ui.json:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command: -c "/bin/prometheus --config.file=/etc/prometheus/prometheus.yaml --log.level=warn"
    entrypoint: sh
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:9090/-/healthy | grep -q "Prometheus Server is Healthy." || exit 1',
        ]
    ports:
      - '9090:9090'
    restart: unless-stopped
    volumes:
      - ${PWD}/docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro

  grafana:
    build:
      context: ${PWD}/docker/grafana
      dockerfile: Dockerfile
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_LOG_LEVEL=warn
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'wget -qO- localhost:3000/api/health | jq .database | grep -q "ok" || exit 1',
        ]
    ports:
      - '3000:3000'
    restart: unless-stopped
    volumes:
      - ${PWD}/docker/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ${PWD}/docker/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ${PWD}/docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
